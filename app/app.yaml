# WARNING: DATABRICKS_TOKEN below is a live PAT in cleartext. This is fine
# for a private hackathon repo, but BEFORE PUSHING THIS REPO PUBLIC OR
# SHARING IT, replace the literal value with a `valueFrom: <secret-scope>/<key>`
# reference and store the token in a Databricks secret scope instead.
# Also rotate the token at:  workspace -> Settings -> Developer -> Access tokens.
command:
  - streamlit
  - run
  - app.py
env:
  - name: DATABRICKS_TOKEN
    value: dapief02a798e680837f8672c7a8d9779d2a
  # The Databricks Apps runtime injects DATABRICKS_HOST without the
  # https:// scheme, which breaks databricks-vectorsearch's URL building
  # ("Invalid URL ... No scheme supplied"). Pin the full URL here.
  - name: DATABRICKS_HOST
    value: https://dbc-a40edca6-d66f.cloud.databricks.com
  # The runtime also auto-injects DATABRICKS_CLIENT_ID + DATABRICKS_CLIENT_SECRET
  # for the app's service principal. With both PAT and OAuth env vars present,
  # the SDK refuses to guess and raises:
  #   "more than one authorization method configured: oauth and pat".
  # Pin the auth type so the SDK uses our PAT and ignores the OAuth creds.
  - name: DATABRICKS_AUTH_TYPE
    value: pat
